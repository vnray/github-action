# PRODUCTION
# Triggers: every push to production branch
# Can require approval via GitHub Environment

name: Production

on:
  push:
    branches:
      - production

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_ENV: production

      - name: Deploy to production
        run: echo "Deploy to production environment"