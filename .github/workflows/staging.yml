# STAGING
# Triggers: every push to staging branch
# Used for QA/UAT testing

name: Staging

on:
  push:
    branches:
      - staging

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_ENV: staging

      - name: Deploy to staging
        run: echo "Deploy to staging environment"